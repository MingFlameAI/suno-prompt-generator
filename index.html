<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno Prompt Generator v1.1</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#0f172a,#1e293b);
    color: white;
    text-align: center;
}

.container {
    max-width: 850px;
    margin: auto;
    padding: 30px 20px;
}

h1 {
    font-size: 26px;
    margin-bottom: 6px;
}

.subtitle {
    opacity: 0.7;
    margin-bottom: 20px;
    font-size: 14px;
}

/* 风格按钮 */
.styles {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin-bottom: 20px;
}

.style-btn {
    padding: 8px 12px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(255,255,255,0.05);
    color: white;
    cursor: pointer;
    font-size: 12px;
}

.style-btn.active {
    background: #22c55e;
    color: black;
}

/* 卡片 */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 16px;
    padding: 20px;
    backdrop-filter: blur(10px);
}

/* 按钮 */
button {
    background: #22c55e;
    border: none;
    padding: 12px 20px;
    font-size: 15px;
    border-radius: 10px;
    cursor: pointer;
    color: black;
    font-weight: bold;
    margin: 10px 5px;
}

button:hover {
    transform: scale(1.03);
}

.secondary {
    background: #3b82f6;
    color: white;
}

/* 输出 */
.output {
    margin-top: 15px;
    padding: 15px;
    background: rgba(0,0,0,0.35);
    border-radius: 12px;
    text-align: left;
    white-space: pre-wrap;
    min-height: 120px;
}

/* toast提示 */
.toast {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0;
    transition: 0.3s;
    color: #22c55e;
}

/* 历史记录 */
.history {
    margin-top: 20px;
    text-align: left;
}

.history-item {
    font-size: 12px;
    opacity: 0.8;
    padding: 6px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
    cursor: pointer;
}

.history-item:hover {
    background: rgba(255,255,255,0.05);
}

.small {
    font-size: 12px;
    opacity: 0.6;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="container">

<h1>🎵 Suno Prompt Generator v1.1</h1>
<div class="subtitle">AI音乐 Prompt 随机生成系统</div>

<!-- 风格 -->
<div class="styles" id="styleBox"></div>

<div class="card">

<button onclick="generatePrompt()">🎲 生成 Prompt</button>
<button class="secondary" onclick="copyPrompt()">📋 复制</button>

<div class="toast" id="toast"></div>

<div class="output" id="output">点击生成 Prompt</div>

<div class="small">提示：选择风格后生成效果更精准</div>

</div>

<!-- 历史 -->
<div class="history">
<h3>📜 历史记录</h3>
<div id="historyList"></div>
</div>

</div>

<script>

/* =========================
   风格库
========================= */
const styles = {
    cinematic: {
        moods: ["epic", "dark cinematic", "melancholic", "uplifting"],
        scenes: ["war battlefield", "space station", "ancient ruins", "future city"],
        themes: ["fate and destiny", "rebirth", "human vs machine", "final sacrifice"]
    },
    emotional: {
        moods: ["nostalgic", "sad", "romantic", "dreamy"],
        scenes: ["rainy street", "empty room", "train window", "old house"],
        themes: ["lost love", "memory", "goodbye", "time passing"]
    },
    cyberpunk: {
        moods: ["dark", "electric", "cold", "intense"],
        scenes: ["neon city", "cyber alley", "data rain", "digital world"],
        themes: ["AI control", "identity loss", "system rebellion", "digital soul"]
    },
    lofi: {
        moods: ["calm", "warm", "relaxed", "nostalgic"],
        scenes: ["coffee shop", "bedroom night", "rainy window", "sunset desk"],
        themes: ["study mood", "slow life", "peaceful mind", "simple time"]
    },
    epic: {
        moods: ["heroic", "powerful", "grand", "intense"],
        scenes: ["storm ocean", "battlefield", "mountain peak", "ancient kingdom"],
        themes: ["rise of hero", "war and peace", "destiny call", "final stand"]
    }
};

let currentStyle = "cinematic";
let lastPrompt = "";

/* =========================
   初始化风格按钮
========================= */
function initStyles() {
    const box = document.getElementById("styleBox");

    for (let key in styles) {
        const btn = document.createElement("div");
        btn.className = "style-btn";
        if (key === currentStyle) btn.classList.add("active");

        btn.innerText = key.toUpperCase();

        btn.onclick = () => {
            currentStyle = key;
            document.querySelectorAll(".style-btn").forEach(b => b.classList.remove("active"));
            btn.classList.add("active");
        };

        box.appendChild(btn);
    }
}

/* =========================
   随机函数
========================= */
function rand(arr) {
    return arr[Math.floor(Math.random() * arr.length)];
}

/* =========================
   生成 Prompt
========================= */
function generatePrompt() {
    const s = styles[currentStyle];

    const prompt =
`STYLE: ${currentStyle}
MOOD: ${rand(s.moods)}
SCENE: ${rand(s.scenes)}
THEME: ${rand(s.themes)}

INSTRUCTION:
Create a cinematic music piece with strong emotional storytelling and professional production quality.`;

    lastPrompt = prompt;
    document.getElementById("output").innerText = prompt;

    saveHistory(prompt);
}

/* =========================
   复制功能（优化版）
========================= */
function copyPrompt() {
    if (!lastPrompt) return;

    navigator.clipboard.writeText(lastPrompt)
    .then(() => {
        showToast("✔ Prompt 已复制");
    })
    .catch(() => {
        showToast("复制失败，请手动复制");
    });
}

/* =========================
   Toast提示
========================= */
function showToast(msg) {
    const toast = document.getElementById("toast");
    toast.innerText = msg;
    toast.style.opacity = 1;

    setTimeout(() => {
        toast.style.opacity = 0;
    }, 1500);
}

/* =========================
   历史记录
========================= */
function saveHistory(prompt) {
    let history = JSON.parse(localStorage.getItem("history") || "[]");

    history.unshift(prompt);
    history = history.slice(0, 10);

    localStorage.setItem("history", JSON.stringify(history));
    renderHistory();
}

function renderHistory() {
    let history = JSON.parse(localStorage.getItem("history") || "[]");
    const box = document.getElementById("historyList");

    box.innerHTML = "";

    history.forEach((h) => {
        const div = document.createElement("div");
        div.className = "history-item";
        div.innerText = h.split("\n")[0] + " ...";

        div.onclick = () => {
            document.getElementById("output").innerText = h;
            lastPrompt = h;
        };

        box.appendChild(div);
    });
}

/* =========================
   启动
========================= */
initStyles();
renderHistory();

</script>

</body>
</html>
