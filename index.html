<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suno Prompt Generator</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width: 800px;
    margin: 40px auto;
    padding: 20px;
    background:#f5f5f5;
}

h1{
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    margin-top:10px;
    font-size:16px;
    cursor:pointer;
}

#output{
    margin-top:20px;
    background:white;
    border:1px solid #ddd;
    padding:15px;
    min-height:120px;
    white-space:pre-wrap;
}
</style>

</head>
<body>

<h1>Suno Prompt Generator</h1>

<input id="genre" placeholder="Genre (Latin Pop, Rock, EDM...)">

<input id="mood" placeholder="Mood (Hopeful, Sad, Energetic...)">

<input id="language" placeholder="Language (English, Spanish...)">

<input id="theme" placeholder="Theme (Love, Freedom, Night...)">

<button onclick="generatePrompt()">
Generate Prompt
</button>

<button onclick="copyPrompt()">
Copy Prompt
</button>

<div id="output"></div>

<script>

function generatePrompt() {

    const genre =
        document.getElementById('genre').value;

    const mood =
        document.getElementById('mood').value;

    const language =
        document.getElementById('language').value;

    const theme =
        document.getElementById('theme').value;

    let style = "";

    if (genre.toLowerCase().includes("latin")) {
        style += "Modern Latin Pop, acoustic guitar, summer vibe, ";
    }

    if (genre.toLowerCase().includes("rock")) {
        style += "Powerful electric guitar, energetic drums, stadium atmosphere, ";
    }

    if (genre.toLowerCase().includes("edm")) {
        style += "Festival energy, synth leads, powerful drops, ";
    }

    if (mood.toLowerCase().includes("hope")) {
        style += "hopeful atmosphere, uplifting melody, emotional chorus, ";
    }

    if (mood.toLowerCase().includes("sad")) {
        style += "melancholic mood, emotional vocals, cinematic feeling, ";
    }

    if (mood.toLowerCase().includes("energetic")) {
        style += "high energy, driving rhythm, exciting dynamics, ";
    }

    if (language.toLowerCase().includes("spanish")) {
        style += "Spanish lyrics, authentic Latin expression, ";
    }

    if (language.toLowerCase().includes("english")) {
        style += "English lyrics, global commercial appeal, ";
    }

    const prompt = `
Theme: ${theme}

${style}

radio-ready production,
professional mix,
catchy melody,
high-quality arrangement
`;

    document.getElementById('output').innerText = prompt;
}

function copyPrompt() {

    const text =
        document.getElementById('output').innerText;

    navigator.clipboard.writeText(text);

    alert("Prompt copied!");
}

</script>

</body>
</html>
